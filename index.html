<style>
:root{
  --ink:#0a0a0c;--surface:#141318;--surface-2:#1d1b22;--line:#2a2730;
  --blood:#c1121f;--blood-bright:#e11d2a;--acid:#86c232;--bone:#ece7da;--smoke:#928d9c;
  --nav-h:64px;--pad:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--ink);color:var(--bone);font-family:'Inter',system-ui,sans-serif;}
body{min-height:100vh;padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));overscroll-behavior-y:none;
  background:radial-gradient(120% 60% at 50% -10%, rgba(193,18,31,.18), transparent 60%), var(--ink);}
img{display:block;max-width:100%;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

.topbar{position:sticky;top:0;z-index:30;padding:calc(env(safe-area-inset-top) + 12px) var(--pad) 11px;
  background:linear-gradient(180deg, rgba(10,10,12,.96), rgba(10,10,12,.7) 70%, transparent);
  backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;gap:11px;}
.hatchet{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--line);
  box-shadow:0 0 14px rgba(193,18,31,.45);flex:none;}
.wordmark-img{height:40px;width:auto;filter:drop-shadow(0 2px 10px rgba(0,0,0,.6));}
.wordmark{font-family:'Anton',sans-serif;font-size:22px;letter-spacing:.02em;line-height:.92;
  text-transform:uppercase;color:var(--bone);text-align:center;text-shadow:0 0 16px rgba(193,18,31,.5);}
.wordmark span{color:var(--blood-bright);}

.alert{margin:0 var(--pad) 4px;background:linear-gradient(90deg,var(--blood),#7a0c14);
  border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:15px;letter-spacing:.02em;
  box-shadow:0 6px 20px rgba(193,18,31,.25);}
.alert .dot{width:8px;height:8px;border-radius:50%;background:var(--bone);flex:none;animation:pulse 1.6s infinite;}
@keyframes pulse{70%{box-shadow:0 0 0 7px rgba(236,231,218,0);}100%{box-shadow:0 0 0 0 rgba(236,231,218,0);}}
.alert .x{margin-left:auto;font-size:18px;opacity:.8;padding:2px 4px;}
.alert.hide{display:none;}

main{padding:8px var(--pad) 28px;}
.view{display:none;animation:fade .25s ease;}
.view.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;
  letter-spacing:.18em;font-size:12px;color:var(--blood-bright);margin:22px 2px 10px;}
.eyebrow:first-child{margin-top:6px;}
.section-title{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:26px;line-height:1.02;
  letter-spacing:.02em;margin:0 2px 14px;}

.hero{position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--line);
  min-height:260px;display:flex;align-items:flex-end;
  background:radial-gradient(130% 90% at 50% 0%, rgba(193,18,31,.34), transparent 58%),
    repeating-linear-gradient(135deg, rgba(255,255,255,.018) 0 2px, transparent 2px 9px),
    linear-gradient(180deg, #1a0608 0%, #120409 40%, var(--ink) 100%);}
.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.92;}
.hero::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(130% 90% at 50% 20%, transparent 55%, rgba(0,0,0,.5));}
.hero::after{content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(8,6,9,.15) 0%,transparent 30%,rgba(8,6,9,.92));}
.hero .cap{position:relative;z-index:2;padding:20px 18px 18px;width:100%;}
.hero .cap .tag{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;
  letter-spacing:.22em;font-size:11px;color:var(--blood-bright);margin-bottom:8px;display:flex;align-items:center;gap:7px;text-shadow:0 1px 6px #000;}
.hero .cap .tag::before{content:"";width:18px;height:2px;background:var(--blood-bright);}
.hero .cap h2{font-family:'Anton',sans-serif;font-size:34px;line-height:.9;text-transform:uppercase;
  letter-spacing:.01em;text-shadow:0 2px 18px #000;-webkit-text-stroke:.5px rgba(0,0,0,.4);}
.hero .cap h2 em{font-style:normal;color:var(--blood-bright);}
.hero .cap p{color:#e7e1d5;font-size:13px;margin-top:8px;font-weight:500;text-shadow:0 1px 6px #000;}
.hero .cap .cta{display:flex;gap:10px;margin-top:15px;}

.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;}
.card.tap:active{transform:scale(.99);border-color:var(--blood);}

.tour{display:flex;align-items:center;gap:14px;}
.tour .date{flex:none;text-align:center;width:54px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:8px 4px;}
.tour .date .m{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;font-size:12px;letter-spacing:.1em;color:var(--blood-bright);}
.tour .date .d{font-family:'Anton',sans-serif;font-size:22px;line-height:1;}
.tour .info{flex:1;min-width:0;}
.tour .info h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tour .info p{color:var(--smoke);font-size:13px;margin-top:2px;}

.btn{display:inline-flex;align-items:center;gap:6px;background:var(--blood);color:var(--bone);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:14px;
  padding:9px 14px;border-radius:10px;white-space:nowrap;}
.btn:active{background:var(--blood-bright);}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--bone);}
.btn.block{display:flex;width:100%;justify-content:center;padding:13px;font-size:15px;}
.btn.sm{padding:7px 11px;font-size:13px;}
.soldout{color:var(--smoke);font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;font-size:13px;letter-spacing:.08em;}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;}
.tile .ph{aspect-ratio:1;background:var(--surface-2);position:relative;}
.tile .ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.tile .body{padding:11px 12px 13px;}
.tile h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;line-height:1.05;}
.tile .price{color:var(--acid);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;margin-top:3px;}

.news{display:flex;gap:13px;align-items:flex-start;}
.news .thumb{flex:none;width:84px;height:84px;border-radius:10px;overflow:hidden;background:var(--surface-2);position:relative;display:grid;place-items:center;}
.news .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.news .thumb .hm{width:46px;height:46px;border-radius:50%;opacity:.85;}
.news .body{flex:1;min-width:0;}
.news .body .when{font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-size:11px;color:var(--blood-bright);}
.news .body h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;line-height:1.12;margin:3px 0 4px;}
.news .body p{color:var(--smoke);font-size:13px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.media-row{display:flex;align-items:center;gap:13px;}
.media-row .ic{flex:none;width:44px;height:44px;border-radius:11px;display:grid;place-items:center;background:var(--surface-2);border:1px solid var(--line);font-size:20px;}
.media-row .lbl{flex:1;}
.media-row .lbl h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;}
.media-row .lbl p{color:var(--smoke);font-size:12.5px;}
.media-row .chev{color:var(--smoke);font-size:20px;}

.quick{display:flex;gap:9px;overflow-x:auto;padding:2px 2px 6px;-webkit-overflow-scrolling:touch;}
.quick::-webkit-scrollbar{display:none;}
.quick a{flex:none;background:var(--surface);border:1px solid var(--line);border-radius:999px;
  padding:9px 15px;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;font-size:13px;color:var(--bone);}
.quick a:active{border-color:var(--blood);color:var(--blood-bright);}

details.acc{background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
details.acc summary{list-style:none;cursor:pointer;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:16px;}
details.acc summary::-webkit-details-marker{display:none;}
details.acc summary .c{color:var(--smoke);font-size:13px;}
details.acc summary::after{content:"+";color:var(--blood-bright);font-size:20px;margin-left:10px;}
details.acc[open] summary::after{content:"\2212";}
.lineup{padding:0 14px 14px;color:#cfc9bd;font-size:14px;line-height:1.7;}
.lineup b{color:var(--bone);}

.gotj-frame{width:100%;height:70vh;min-height:420px;border:1px solid var(--line);border-radius:14px;background:var(--surface);margin-top:6px;}
.note{color:var(--smoke);font-size:12px;line-height:1.5;margin:14px 2px 0;text-align:center;}

.social-strip{display:flex;gap:10px;margin-top:4px;}
.social-strip a{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 4px;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--smoke);}
.social-strip a:active{border-color:var(--blood);color:var(--bone);}
.social-strip a .g{font-size:18px;color:var(--blood-bright);}

nav{position:fixed;left:0;right:0;bottom:0;z-index:40;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);display:flex;background:rgba(15,14,18,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--smoke);
  font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:11px;}
nav button .glyph{font-size:20px;line-height:1;}
nav button.active{color:var(--blood-bright);}
</style>

    { label:"The Vault", sub:"Rare & exclusive video", glyph:"&#9658;", url:"https://psychopathicvault.com/" }
  ],

  family: [
    { label:"Insane Clown Posse", sub:"Psychopathic Records", glyph:"&#9760;", url:"https://www.psychopathicrecords.com/artists" },
    { label:"Ouija Macc", sub:"Psychopathic Records", glyph:"&#9760;", url:"https://www.psychopathicrecords.com/artists" },
    { label:"Wakko the Kidd", sub:"Psychopathic Records", glyph:"&#9760;", url:"https://www.psychopathicrecords.com/artists" }
  ],

  social: [
    { label:"Instagram", glyph:"&#9673;", url:"https://www.instagram.com/therealicp" },
    { label:"Facebook", glyph:"&#9612;", url:"https://www.facebook.com/INSANECLOWNPOSSE" },
    { label:"TikTok", glyph:"&#9834;", url:"https://www.tiktok.com/@insaneclownposse" },
    { label:"X", glyph:"&#10006;", url:"https://www.twitter.com/ICP" }
  ]
};

const HATCHET = "https://static.wixstatic.com/media/85c5d2_2d0ad53cdbba4e67950056dc3f329738~mv2.jpg";

const $ = (id)=>document.getElementById(id);
function openUrl(url){
  if(!url) return;
  try{ const w = window.open(url, "_blank", "noopener"); if(!w) location.href = url; }
  catch(e){ location.href = url; }
}
function ph(img){ return img ? `<img src="${img}" alt="" onerror="this.remove()">` : `<img class="hm" src="${HATCHET}" alt="">`; }

function renderHero(){
  const h=CONFIG.hero;
  const next=CONFIG.tour.find(t=>t.status!=="soldout")||CONFIG.tour[0];
  const nextLine = next ? `Next: ${next.city} &middot; ${next.month} ${next.day}` : "";
  const img = h.img ? `<img src="${h.img}" alt="Insane Clown Posse" onerror="this.remove()">` : "";
  const title = h.img ? "" : `<h2>INSANE <em>CLOWN</em> POSSE</h2>`;
  $("hero").innerHTML = `${img}
    <div class="cap">
      <div class="tag">Official App</div>
      ${title}
      <p>${nextLine}</p>
      <div class="cta">
        <button class="btn" onclick="go('tour')">Get tickets</button>
        <button class="btn ghost" onclick="go('news')">Latest news</button>
      </div>
    </div>`;
}

function newsCard(n){
  return `<div class="card tap news" onclick="openUrl('${n.url}')">
    <div class="thumb">${ph(n.img)}</div>
    <div class="body"><div class="when">${n.when}</div><h3>${n.title}</h3><p>${n.excerpt}</p></div></div>`;
}

function tourRow(t){
  let action;
  if(t.status==="soldout") action = `<span class="soldout">Sold out</span>`;
  else if(t.status==="notify") action = `<button class="btn sm ghost" onclick="openUrl('${t.ticketUrl}')">Notify me</button>`;
  else action = `<button class="btn sm" onclick="openUrl('${t.ticketUrl}')">Tickets</button>`;
  return `<div class="card tour">
    <div class="date"><div class="m">${t.month}</div><div class="d">${t.day}</div></div>
    <div class="info"><h3>${t.city}</h3><p>${t.venue}</p></div>${action}</div>`;
}

function merchTile(m){
  return `<div class="tile tap" onclick="openUrl('${m.url}')">
    <div class="ph">${m.img?`<img src="${m.img}" alt="" onerror="this.remove()">`:""}</div>
    <div class="body"><h3>${m.name}</h3><div class="price">${m.price}</div></div></div>`;
}

function mediaRow(m){
  return `<div class="card tap media-row" onclick="openUrl('${m.url}')">
    <div class="ic">${m.glyph}</div>
    <div class="lbl"><h3>${m.label}</h3><p>${m.sub}</p></div>
    <div class="chev">&rsaquo;</div></div>`;
}

function renderAll(){
  renderHero();

  $("home-news").innerHTML = CONFIG.news.slice(0,2).map(newsCard).join("");
  $("news-list").innerHTML = CONFIG.news.map(newsCard).join("");
  const next = CONFIG.tour.find(t=>t.status!=="soldout") || CONFIG.tour[0];
  $("home-next").innerHTML = next ? tourRow(next) : `<p class="note">No dates announced yet.</p>`;

  $("tour-list").innerHTML = CONFIG.tour.length ? CONFIG.tour.map(tourRow).join("") : `<p class="note">No dates announced yet.</p>`;

  $("shop-grid").innerHTML = CONFIG.merch.map(merchTile).join("");
  $("shop-all").onclick = ()=>openUrl(CONFIG.storeUrl);

  $("music-list").innerHTML = CONFIG.music.map(mediaRow).join("");
  $("video-list").innerHTML = CONFIG.video.map(mediaRow).join("");
  $("family-list").innerHTML = (CONFIG.family||[]).map(mediaRow).join("");
  $("social-strip").innerHTML = (CONFIG.social||[]).map(s=>
    `<a href="#" onclick="openUrl('${s.url}');return false;"><span class="g">${s.glyph}</span>${s.label}</a>`).join("");

  const gi = CONFIG.gotjInfo;
  if(gi){
    $("gotj-info").innerHTML =
      `<div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:18px;line-height:1.1;">${gi.name}</div>
       <div style="color:var(--blood-bright);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;margin-top:4px;">${gi.dates}</div>
       <div style="color:var(--smoke);font-size:13px;margin-top:5px;">${gi.venue}<br>${gi.address}</div>
       <button class="btn block" style="margin-top:12px;" onclick="openUrl('${gi.url}')">Get tickets</button>`;
  }
  $("gotj-links").innerHTML = (CONFIG.gotjLinks||[]).map(l=>
    `<a href="#" onclick="openUrl('${l.url}');return false;">${l.label}</a>`).join("");
  $("gotj-lineup").innerHTML = Object.entries(CONFIG.gotjLineup||{}).map(([stage,acts])=>
    `<details class="acc"><summary>${stage}<span class="c">${acts.filter(a=>a!=="More coming soon").length} acts</span></summary>
     <div class="lineup">${acts.map(a=>a==="More coming soon"?`<i>${a}</i>`:`<b>${a}</b>`).join("  &middot;  ")}</div></details>`).join("");
  $("gotj-frame").src = CONFIG.gotjUrl;
  $("gotj-open").onclick = ()=>openUrl(CONFIG.gotjUrl);

  if(CONFIG.alert && CONFIG.alert.text){
    $("alert-text").textContent = CONFIG.alert.text;
    $("alert").classList.remove("hide");
    if(CONFIG.alert.url) $("alert").onclick = (e)=>{ if(!e.target.classList.contains('x')) openUrl(CONFIG.alert.url); };
  }
}
function dismissAlert(){ $("alert").classList.add("hide"); }

function go(tab){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  $("view-"+tab).classList.add("active");
  const hasBtn = [...document.querySelectorAll("nav button")].some(b=>b.dataset.tab===tab);
  document.querySelectorAll("nav button").forEach(b=>
    b.classList.toggle("active", b.dataset.tab===(hasBtn?tab:"home")));
  window.scrollTo({top:0});
}
document.querySelectorAll("nav button").forEach(b=>
  b.addEventListener("click", ()=>go(b.dataset.tab)));

const FIREBASE_CONFIG = {
  apiKey: "PASTE_API_KEY",
  authDomain: "PASTE_PROJECT.firebaseapp.com",
  projectId: "PASTE_PROJECT_ID",
  appId: "PASTE_APP_ID"
};
async function loadRemoteConfig(){
  try{
    if(typeof firebase==="undefined") return;
    if(!FIREBASE_CONFIG.projectId || FIREBASE_CONFIG.projectId==="PASTE_PROJECT_ID") return;
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const snap = await firebase.firestore().collection("icpApp").doc("content").get();
    if(!snap.exists) return;
    const d = snap.data() || {};
    ["alert","hero","gotjInfo","gotjLinks","gotjLineup","tour","merch","news","music","video","family","social","storeUrl","gotjUrl"]
      .forEach(k=>{ if(d[k]!==undefined && d[k]!==null) CONFIG[k] = d[k]; });
    renderAll();
  }catch(e){}
}

renderAll();
loadRemoteConfig();
</script>
</body>
</html>
